# .github/workflows/daily_scrape.yml
#
# Runs the MFC scraper every day at 03:00 Singapore Time (SGT = UTC+8)
# → 03:00 SGT  =  19:00 UTC (previous day)
#
# What it does:
#   1. Spins up a Python 3.12 runner
#   2. Installs scraper dependencies
#   3. Runs mfc_scraper.py --incremental (skips already-cached figures)
#   4. If figures.json changed, commits it back to the repo
#   5. Optionally triggers a Vercel / Netlify redeploy via webhook
#
# Required repo secrets (Settings → Secrets → Actions):
#   VERCEL_DEPLOY_HOOK  (optional) — webhook URL for redeploy trigger

name: Daily MFC Scrape

on:
  # ── Scheduled: every day at 19:00 UTC = 03:00 SGT ──────────────────
  schedule:
    - cron: "0 19 * * *"

  # ── Manual trigger from Actions tab ────────────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: "Scrape mode"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - full

  # ── Also run on push to main (useful for first-time setup) ──────────
  push:
    branches: [main]
    paths:
      - "scraper/**"
      - ".github/workflows/daily_scrape.yml"

# Only allow one scrape to run at a time
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape MyFigureCollection
    runs-on: ubuntu-latest
    timeout-minutes: 120   # MFC can be slow; give it 2 hours max

    permissions:
      contents: write    # needed to commit figures.json back

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      # ── 3. Install dependencies ────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ── 4. Run scraper ─────────────────────────────────────────────
      - name: Run MFC scraper
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          echo "Running in $MODE mode"
          if [ "$MODE" = "full" ]; then
            python scraper/mfc_scraper.py
          else
            python scraper/mfc_scraper.py --incremental
          fi

      # ── 5. Check if data changed ───────────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/figures.json public/meta.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      # ── 6. Commit updated data ────────────────────────────────────
      - name: Commit updated figures.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "miku-scraper-bot[bot]"
          git config user.email "miku-scraper-bot@users.noreply.github.com"
          git add public/figures.json public/meta.json
          COUNT=$(python -c "import json; d=json.load(open('public/figures.json')); print(len(d))")
          git commit -m "🤖 scraper: update figure database (${COUNT} figures) [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      # ── 7. Trigger Vercel redeploy (optional) ─────────────────────
      - name: Trigger Vercel redeploy
        if: >
          steps.changes.outputs.changed == 'true' &&
          secrets.VERCEL_DEPLOY_HOOK != ''
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"reason": "figures.json updated by scraper"}' \
          | python -m json.tool

      # ── 8. Summary ────────────────────────────────────────────────
      - name: Print summary
        if: always()
        run: |
          if [ -f public/meta.json ]; then
            echo "═══ Scrape Summary ═══"
            cat public/meta.json | python -m json.tool
          fi
          echo "════════════════════════════════════"
          echo "Finished at: $(TZ='Asia/Singapore' date '+%Y-%m-%d %H:%M:%S SGT')"
